version: 2
updates:
  - package-ecosystem: "pre-commit"
    directory: "/"
    cooldown:
      default-days: 10
    schedule:
      interval: "yearly"
    groups:
      "pre-commit formatters":
        patterns:
          - "*/isort"
          - "*/black-pre-commit-mirror"
          - "*/pyupgrade"
      "pre-commit linters":
        patterns:
          - "*"
