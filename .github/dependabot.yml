version: 2
updates:
  - package-ecosystem: "pre-commit"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "yearly"
    groups:
      formatters:
        patterns:
          - "*/isort"
          - "*/black-pre-commit-mirror"
          - "*/pyupgrade"
      linters:
        patterns:
          - "*"
